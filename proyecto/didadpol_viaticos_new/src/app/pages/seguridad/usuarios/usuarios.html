<div class="grid">
  <div class="card">
    <h3>Crear usuario</h3>

    <div class="msg ok" *ngIf="msg">{{ msg }}</div>
    <div class="msg err" *ngIf="err">{{ err }}</div>

    <form class="form" [formGroup]="form" (ngSubmit)="submit()">
      <label>
        Empleado
        <select formControlName="idEmpleado">
          <option value="">— Seleccione un empleado —</option>
          <option *ngFor="let emp of empleados" [value]="emp.id_empleado">
            {{ emp.primer_nombre }} {{ emp.primer_apellido }}
          </option>
        </select>
      </label>
      
      <label>Usuario <input type="text" formControlName="username" /></label>
      <label>Email <input type="email" formControlName="email" /></label>
      <label>Contraseña <input type="password" formControlName="password" /></label>

      <label>
        Rol
        <select formControlName="roles">
          <option value="">— Seleccione un rol —</option>
          <option *ngFor="let r of rolesCatalogo" [value]="r.id">
            {{ r.name }}
          </option>
        </select>
      </label>

      <label class="chk">
        <input type="checkbox" formControlName="activo" /> Activo
      </label>

      <button class="btn" type="submit" [disabled]="form.invalid || loading">
        {{ loading ? 'Cargando...' : 'Guardar' }}
      </button>
    </form>
  </div>

  <div class="card">
    <h3>Listado de Usuarios</h3>
    <div class="table-container">
      <table class="tbl">
        <thead>
          <tr>
            <th>Usuario</th>
            <th>Email</th>
            <th>Roles</th>
            <th>Estado</th>
            <th>Acciones</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let u of usuarios">
            <td>{{ u.username }}</td>
            <td>{{ u.email }}</td>
            <td>
              <span *ngFor="let rid of u.roles; let last = last">
                {{ rolName(rid) }}<span *ngIf="!last">, </span>
              </span>
            </td>
            <td>
              <span class="badge" [ngClass]="u.activo ? 'badge--active' : 'badge--off'">
                {{ u.activo ? 'Activo' : 'Inactivo' }}
              </span>
            </td>
            <td>
              <button class="btn btn--line" (click)="toggle(u)">Bloquear</button>
              <button class="btn btn--danger" (click)="delete(u)">Inactivar</button>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
